<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Sync Pro</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --text: #cdd6f4;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --error: #f38ba8;
            --surface: #313244;
            --overlay: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* Split Screen UI */
        .half {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .push-zone { border-bottom: 2px dashed var(--surface); }
        .push-zone:active { background: rgba(166, 227, 161, 0.1); }
        .pull-zone:active { background: rgba(137, 180, 250, 0.1); }

        .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .label { font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        /* Center Display Card */
        .preview-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 16px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; /* Clicks pass to zones */
            z-index: 10;
        }

        .preview-text {
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            word-break: break-all;
            font-size: 0.95rem;
            text-align: center;
        }

        .status-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .status-msg.show { transform: translateX(-50%) translateY(0); }
        .success { background: var(--success); color: #111; }
        .error { background: var(--error); color: #fff; }

        .device-tag {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="half push-zone" id="btn-push">
        <div class="icon">☁️</div>
        <div class="label">Push to Cloud</div>
        <div style="font-size: 0.7rem; opacity: 0.5;">Upload your local clipboard</div>
    </div>

    <div class="preview-card">
        <div style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 8px; text-align: center;">CLOUD CONTENT</div>
        <div class="preview-text" id="preview-text">Connecting...</div>
    </div>

    <div class="half pull-zone" id="btn-pull">
        <div class="icon">📲</div>
        <div class="label">Pull from Cloud</div>
        <div style="font-size: 0.7rem; opacity: 0.5;">Download to your device</div>
    </div>

    <div id="toast" class="status-msg"></div>
    <div class="device-tag" id="device-tag">Detecting...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_1mKhifIdkrM4mGxbfOobDLhifJMpyO4",
            authDomain: "copy-it-66544.firebaseapp.com",
            projectId: "copy-it-66544",
            storageBucket: "copy-it-66544.firebasestorage.app",
            messagingSenderId: "572051545271",
            appId: "1:572051545271:web:1c156dce5e75551af90132",
            measurementId: "G-5HKBTLH306",
            databaseURL: "https://copy-it-66544-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const clipRef = ref(db, 'clipboard_data');

        const previewEl = document.getElementById('preview-text');
        const toastEl = document.getElementById('toast');
        const deviceTag = document.getElementById('device-tag');

        let cloudText = "";
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
        deviceTag.textContent = isMobile ? "MOBILE MODE" : "PC MODE";

        function notify(msg, type = 'success') {
            toastEl.textContent = msg;
            toastEl.className = `status-msg show ${type}`;
            setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        // Listen for Cloud Changes
        onValue(clipRef, (snap) => {
            cloudText = snap.val() || "";
            previewEl.textContent = cloudText.length > 80 ? cloudText.substring(0, 80) + "..." : (cloudText || "Empty Cloud");
        });

        // UPLOAD LOGIC (PUSH)
        async function pushToCloud() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) return notify("Clipboard is empty", "error");
                if (text === cloudText) return notify("Already in sync");
                
                await set(clipRef, text);
                notify("Cloud Updated! 🚀");
            } catch (err) {
                notify("Click to grant permission", "error");
            }
        }

        // DOWNLOAD LOGIC (PULL)
        async function pullFromCloud() {
            if (!cloudText) return notify("Cloud is empty", "error");
            try {
                await navigator.clipboard.writeText(cloudText);
                notify("Device Updated! ✅");
            } catch (err) {
                notify("Failed to write to clipboard", "error");
            }
        }

        // Event Listeners
        document.getElementById('btn-push').addEventListener('click', pushToCloud);
        document.getElementById('btn-pull').addEventListener('click', pullFromCloud);

        // Auto-Sync for PC on focus
        if (!isMobile) {
            window.addEventListener('focus', pushToCloud);
        }
    </script>
</body>
</html>
