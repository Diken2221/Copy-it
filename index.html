<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Sync Pro + Any File</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --text: #cdd6f4;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --error: #f38ba8;
            --surface: #313244;
            --overlay: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .half {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
            z-index: 1;
        }

        .push-zone { border-bottom: 2px dashed var(--surface); }
        .push-zone:active { background: rgba(166, 227, 161, 0.1); }
        .pull-zone:active { background: rgba(137, 180, 250, 0.1); }

        .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .label { font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        /* Center Display Card */
        .preview-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            padding: 1rem;
            border-radius: 16px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-content {
            width: 100%;
            max-height: 200px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
        }

        #preview-img {
            max-width: 100%;
            max-height: 160px;
            object-fit: contain;
            display: none;
        }

        .preview-text {
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            word-break: break-all;
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
        }

        .file-info {
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        .status-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .status-msg.show { transform: translateX(-50%) translateY(0); }
        .success { background: var(--success); color: #111; }
        .error { background: var(--error); color: #fff; }

        .device-tag {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.7rem;
            opacity: 0.4;
        }

        .upload-hint {
            margin-top: 8px;
            font-size: 0.65rem;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 4px;
            pointer-events: auto;
        }

        /* Hidden file input for mobile support */
        #file-input { display: none; }
    </style>
</head>
<body>

    <input type="file" id="file-input">

    <div class="half push-zone" id="btn-push">
        <div class="icon">☁️</div>
        <div class="label">Push to Cloud</div>
        <div style="font-size: 0.7rem; opacity: 0.5;">Upload Text, Image, or File</div>
        <div class="upload-hint" id="file-trigger">Click here to browse files</div>
    </div>

    <div class="preview-card">
        <div style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 8px; text-align: center;">CLOUD CONTENT</div>
        <div class="preview-content">
            <img id="preview-img" alt="Clipboard Image">
            <div class="preview-text" id="preview-text">Connecting...</div>
            <div id="file-details" class="file-info"></div>
        </div>
    </div>

    <div class="half pull-zone" id="btn-pull">
        <div class="icon">📲</div>
        <div class="label">Pull from Cloud</div>
        <div style="font-size: 0.7rem; opacity: 0.5;">Download to Device</div>
    </div>

    <div id="toast" class="status-msg"></div>
    <div class="device-tag" id="device-tag">Detecting...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_1mKhifIdkrM4mGxbfOobDLhifJMpyO4",
            authDomain: "copy-it-66544.firebaseapp.com",
            projectId: "copy-it-66544",
            storageBucket: "copy-it-66544.firebasestorage.app",
            messagingSenderId: "572051545271",
            appId: "1:572051545271:web:1c156dce5e75551af90132",
            measurementId: "G-5HKBTLH306",
            databaseURL: "https://copy-it-66544-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const clipRef = ref(db, 'clipboard_data');

        const previewEl = document.getElementById('preview-text');
        const previewImg = document.getElementById('preview-img');
        const fileDetails = document.getElementById('file-details');
        const toastEl = document.getElementById('toast');
        const deviceTag = document.getElementById('device-tag');
        const fileInput = document.getElementById('file-input');
        const fileTrigger = document.getElementById('file-trigger');

        let cloudData = { type: 'text', content: '', name: '' };
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
        deviceTag.textContent = isMobile ? "MOBILE MODE" : "PC MODE";

        function notify(msg, type = 'success') {
            toastEl.textContent = msg;
            toastEl.className = `status-msg show ${type}`;
            setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        // Listen for Cloud Changes
        onValue(clipRef, (snap) => {
            const data = snap.val();
            if (!data) {
                cloudData = { type: 'text', content: '', name: '' };
                previewEl.textContent = "Empty Cloud";
                previewEl.style.display = "block";
                previewImg.style.display = "none";
                fileDetails.style.display = "none";
                return;
            }

            cloudData = typeof data === 'string' ? { type: 'text', content: data } : data;

            if (cloudData.type === 'image') {
                previewImg.src = cloudData.content;
                previewImg.style.display = "block";
                previewEl.style.display = "none";
                fileDetails.style.display = "none";
            } else if (cloudData.type === 'file') {
                previewImg.style.display = "none";
                previewEl.style.display = "block";
                previewEl.textContent = "📄 " + (cloudData.name || "Unknown File");
                fileDetails.style.display = "block";
                fileDetails.textContent = `Type: ${cloudData.mime || 'Binary'}`;
            } else {
                previewImg.style.display = "none";
                previewEl.style.display = "block";
                fileDetails.style.display = "none";
                const txt = cloudData.content || "";
                previewEl.textContent = txt.length > 80 ? txt.substring(0, 80) + "..." : (txt || "Empty");
            }
        });

        const blobToBase64 = blob => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });

        // UPLOAD LOGIC
        async function pushToCloud(e) {
            // If the user specifically clicked the "Browse" button, skip clipboard
            if (e && e.target.id === 'file-trigger') {
                fileInput.click();
                return;
            }

            try {
                // PC/Clipboard support
                const items = await navigator.clipboard.read();
                let foundContent = false;
                for (const item of items) {
                    const imageType = item.types.find(type => type.startsWith('image/'));
                    if (imageType) {
                        const blob = await item.getType(imageType);
                        const base64 = await blobToBase64(blob);
                        if (base64.length > 5 * 1024 * 1024) return notify("Image too large (>5MB)", "error");
                        await set(clipRef, { type: 'image', content: base64 });
                        notify("Image Pushed! 🖼️");
                        foundContent = true;
                        break;
                    }
                    
                    if (item.types.includes('text/plain')) {
                        const blob = await item.getType('text/plain');
                        const text = await blob.text();
                        if (text) {
                            if (text === cloudData.content) notify("Already in sync");
                            else {
                                await set(clipRef, { type: 'text', content: text });
                                notify("Text Pushed! 🚀");
                            }
                            foundContent = true;
                            break;
                        }
                    }
                }
                
                // If nothing in clipboard, trigger file picker
                if (!foundContent) fileInput.click();

            } catch (err) {
                // Fallback for mobile or blocked permissions
                fileInput.click();
            }
        }

        // Handle File Input (Explicit files from computer/phone storage)
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                return notify("File too large (>5MB)", "error");
            }

            const base64 = await blobToBase64(file);
            const type = file.type.startsWith('image/') ? 'image' : 'file';
            
            await set(clipRef, { 
                type: type, 
                content: base64, 
                name: file.name,
                mime: file.type 
            });
            notify(`${type === 'image' ? 'Image' : 'File'} Pushed! 📁`);
            fileInput.value = ""; // Clear for next use
        };

        // DOWNLOAD LOGIC
        async function pullFromCloud() {
            if (!cloudData.content) return notify("Cloud is empty", "error");
            
            try {
                if (cloudData.type === 'image' || cloudData.type === 'file') {
                    const response = await fetch(cloudData.content);
                    const blob = await response.blob();

                    if (cloudData.type === 'image') {
                        try {
                            await navigator.clipboard.write([
                                new ClipboardItem({ [blob.type]: blob })
                            ]);
                            notify("Image Downloaded to Clipboard! 🖼️");
                        } catch (e) {
                            triggerDownload(blob, cloudData.name || 'image.png');
                        }
                    } else {
                        triggerDownload(blob, cloudData.name || 'file.bin');
                    }
                } else {
                    await navigator.clipboard.writeText(cloudData.content);
                    notify("Text Downloaded! ✅");
                }
            } catch (err) {
                console.error(err);
                notify("Download failed", "error");
            }
        }

        function triggerDownload(blob, filename) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            notify("File Downloaded! 📥");
        }

        document.getElementById('btn-push').addEventListener('click', pushToCloud);
        document.getElementById('btn-pull').addEventListener('click', pullFromCloud);

        if (!isMobile) {
            window.addEventListener('focus', (e) => {
                // On auto-focus, we don't want to trigger the file picker if clipboard is empty
                // So we use a silent version of push
                navigator.clipboard.read().then(items => {
                    for (const item of items) {
                        if (item.types.includes('text/plain')) {
                             item.getType('text/plain').then(blob => blob.text()).then(text => {
                                 if (text && text !== cloudData.content) {
                                     set(clipRef, { type: 'text', content: text });
                                     notify("Auto-Synced Text! 🚀");
                                 }
                             });
                        }
                    }
                }).catch(() => {});
            });
        }
    </script>
</body>
</html>
