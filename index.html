<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Clipboard Sync</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --text: #cdd6f4;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --error: #f38ba8;
            --surface: #313244;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            overflow: hidden;
            transition: background-color 0.3s ease;
            user-select: none;
        }

        body:active {
            background-color: #24273a;
        }

        .container {
            max-width: 90%;
            pointer-events: none; /* Let clicks pass through to body */
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .preview-box {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 100%;
            word-break: break-all;
        }

        .status-msg {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .status-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }

        .success { background-color: var(--success); color: #111; }
        .error { background-color: var(--error); color: #111; }

        .device-info {
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="main-status">Initializing Sync...</h1>
        <div class="preview-box" id="preview-text">Waiting for data...</div>
        <div class="device-info" id="device-type">Detecting device...</div>
    </div>

    <div id="toast" class="status-msg"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD_1mKhifIdkrM4mGxbfOobDLhifJMpyO4",
            authDomain: "copy-it-66544.firebaseapp.com",
            projectId: "copy-it-66544",
            storageBucket: "copy-it-66544.firebasestorage.app",
            messagingSenderId: "572051545271",
            appId: "1:572051545271:web:1c156dce5e75551af90132",
            measurementId: "G-5HKBTLH306",
            databaseURL: "https://copy-it-66544-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const clipboardRef = ref(db, 'clipboard_data');

        // UI Elements
        const statusEl = document.getElementById('main-status');
        const previewEl = document.getElementById('preview-text');
        const deviceEl = document.getElementById('device-type');
        const toastEl = document.getElementById('toast');

        let currentDBValue = "";
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // Helper: Show Toast
        function showToast(message, type = 'success') {
            toastEl.textContent = message;
            toastEl.className = `status-msg show ${type}`;
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2500);
        }

        // 1. Firebase Listener (Global)
        onValue(clipboardRef, (snapshot) => {
            const data = snapshot.val();
            currentDBValue = data || "";
            
            // Truncate preview to 50 chars
            const displayValue = currentDBValue.length > 50 
                ? currentDBValue.substring(0, 50) + "..." 
                : currentDBValue || "Clipboard is empty";
            
            previewEl.textContent = displayValue;
        });

        // 2. Logic Branching based on Device
        if (isMobile) {
            // MOBILE LOGIC
            deviceEl.textContent = "Mode: Mobile Receiver";
            statusEl.innerHTML = "📥 New text ready!<br>Tap anywhere to copy.";

            document.body.addEventListener('click', async () => {
                if (!currentDBValue) {
                    showToast("Nothing to copy!", "error");
                    return;
                }

                try {
                    await navigator.clipboard.writeText(currentDBValue);
                    showToast("Copied to phone clipboard!");
                } catch (err) {
                    console.error("Copy failed", err);
                    showToast("Tap again or check permissions", "error");
                }
            });

        } else {
            // PC LOGIC
            deviceEl.textContent = "Mode: PC Auto-Sync";
            statusEl.textContent = "💻 PC Mode: Switch to this tab to auto-sync clipboard.";

            window.addEventListener('focus', async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    
                    if (clipboardText && clipboardText !== currentDBValue) {
                        await set(clipboardRef, clipboardText);
                        showToast("Clipboard synced to Cloud!");
                    }
                } catch (err) {
                    console.error("Paste failed", err);
                    statusEl.innerHTML = "⚠️ Permission Denied<br><small>Click anywhere to enable or check browser settings</small>";
                }
            });

            // Fallback for first interaction to request permissions
            document.body.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text !== currentDBValue) {
                        await set(clipboardRef, text);
                        showToast("Manual Sync Successful!");
                    } else {
                        showToast("Already in sync");
                    }
                } catch (err) {
                    showToast("Please allow clipboard access in browser", "error");
                }
            });
        }
    </script>
</body>
</html>
